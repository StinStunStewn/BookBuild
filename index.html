<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Storyloom Studio</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: #0c120f;
  color: #e6f2ec;
}

/* Layout */
#view {
  padding: 20px;
  padding-bottom: 100px;
  padding-top: calc(20px + env(safe-area-inset-top));
}

h2 {
  margin-top: 10px;
  font-weight: 500;
}

/* Filter Bar */
.filter-bar {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

.filter {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  white-space: nowrap;
  font-size: 14px;
}

.filter.active {
  background: #2e6f57;
}

/* Buttons */
button {
  background: #1f3a2f;
  color: #e6f2ec;
  border: none;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
}

/* Cards */
.card {
  background: linear-gradient(145deg, #16211c, #101915);
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 14px;
}

/* Tags */
.tag {
  background: rgba(62,194,143,0.2);
  padding: 4px 8px;
  border-radius: 8px;
  margin-right: 6px;
  font-size: 12px;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(17,26,22,0.95);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  border-top: 1px solid rgba(255,255,255,0.05);
}

.bottom-nav button {
  font-size: 12px;
  opacity: 0.7;
}

.bottom-nav button.active {
  opacity: 1;
  color: #3ec28f;
}

/* Modal (iOS sheet style) */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: flex-end;
}

.modal.hidden {
  display: none;
}

.modal-content {
  background: #16211c;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 600px;
}

/* Inputs */
input, textarea, select {
  width: 100%;
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #0f1412;
  color: #e6f2ec;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="view"></div>

<nav class="bottom-nav">
  <button id="tab-world" onclick="navigate('world')">World</button>
  <button id="tab-characters" onclick="navigate('characters')">Characters</button>
  <button id="tab-plot" onclick="navigate('plot')">Plot</button>
  <button id="tab-timeline" onclick="navigate('timeline')">Timeline</button>
</nav>

<div id="modal" class="modal hidden"></div>

<script>
let state = {
  world: JSON.parse(localStorage.getItem('world')) || []
};

let activeTab = "world";
let activeCategory = "All";

const categories = ["All","Herbs","Healing Practices","Religion","Social","Locations","Other"];

function save() {
  localStorage.setItem("world", JSON.stringify(state.world));
}

/* Navigation */

function navigate(tab) {
  activeTab = tab;
  updateActiveTab();

  if (tab === "world") renderWorld();
  else document.getElementById("view").innerHTML = "<h2>" + tab + " (coming soon)</h2>";
}

function updateActiveTab() {
  document.querySelectorAll(".bottom-nav button").forEach(btn => btn.classList.remove("active"));
  document.getElementById("tab-" + activeTab).classList.add("active");
}

/* World */

function renderWorld() {
  const view = document.getElementById("view");

  view.innerHTML = `
    <h2>World</h2>

    <div class="filter-bar">
      ${categories.map(c => `
        <span class="filter ${activeCategory===c?"active":""}" onclick="setCategory('${c}')">${c}</span>
      `).join("")}
    </div>

    <button onclick="openWorldForm()">New Entry</button>

    <div id="worldList"></div>
  `;

  renderWorldList();
}

function setCategory(cat) {
  activeCategory = cat;
  renderWorld();
}

function renderWorldList() {
  const list = document.getElementById("worldList");
  list.innerHTML = "";

  const filtered = activeCategory==="All"
    ? state.world
    : state.world.filter(e => e.category === activeCategory);

  filtered.forEach(entry => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${entry.title}</strong>
      <p>${entry.content || ""}</p>
      <div>${(entry.tags||[]).map(t=>"<span class='tag'>"+t+"</span>").join("")}</div>
      ${entry.file ? "<p>File attached</p>" : ""}
    `;

    list.appendChild(div);
  });
}

/* Modal */

function openWorldForm() {
  const modal = document.getElementById("modal");
  modal.classList.remove("hidden");

  modal.innerHTML = `
    <div class="modal-content">
      <h3>New Entry</h3>

      <input id="title" placeholder="Title">
      <select id="category">
        ${categories.filter(c=>c!=="All").map(c=>"<option>"+c+"</option>").join("")}
      </select>
      <textarea id="content" placeholder="Content"></textarea>
      <input id="tags" placeholder="Tags (comma separated)">
      <input type="file" id="file">

      <button onclick="saveWorld()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  `;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

function saveWorld() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const content = document.getElementById("content").value;
  const tags = document.getElementById("tags").value.split(",").map(t=>t.trim());

  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!title) return;

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      state.world.push({
        title, category, content, tags,
        file: e.target.result
      });
      save();
      closeModal();
      renderWorld();
    };
    reader.readAsDataURL(file);
  } else {
    state.world.push({ title, category, content, tags });
    save();
    closeModal();
    renderWorld();
  }
}

/* Init */
navigate("world");
</script>

</body>
</html>
