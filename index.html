<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Storyloom Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: #0c120f;
  color: #e6f2ec;
}

#view {
  padding: 20px;
  padding-bottom: 80px;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111a16;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.bottom-nav button {
  background: none;
  border: none;
  color: #cfe8dc;
}

.card {
  background: linear-gradient(145deg, #16211c, #101915);
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 12px;
}

button {
  background: #1f3a2f;
  color: #e6f2ec;
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
}

.filter {
  padding: 6px 10px;
  border-radius: 8px;
  margin-right: 6px;
  display: inline-block;
  cursor: pointer;
}

.filter.active {
  background: #2e6f57;
}

.tag {
  background: rgba(62,194,143,0.2);
  padding: 3px 6px;
  border-radius: 6px;
  margin-right: 4px;
  font-size: 12px;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal.hidden {
  display: none;
}

.modal-content {
  background: #16211c;
  padding: 20px;
  border-radius: 14px;
  width: 90%;
  max-width: 400px;
}

input, textarea, select {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #0f1412;
  color: #e6f2ec;
}
</style>
</head>

<body>

<div id="view"></div>

<nav class="bottom-nav">
  <button onclick="navigate('world')">World</button>
  <button onclick="navigate('characters')">Characters</button>
  <button onclick="navigate('plot')">Plot</button>
  <button onclick="navigate('timeline')">Timeline</button>
</nav>

<div id="modal" class="modal hidden"></div>

<script>
let state = {
  world: JSON.parse(localStorage.getItem('world')) || []
};

let activeTab = "world";
let activeCategory = "All";

const categories = ["All","Herbs","Healing Practices","Religion","Social","Locations","Other"];

function save() {
  localStorage.setItem("world", JSON.stringify(state.world));
}

function navigate(tab) {
  activeTab = tab;

  if (tab === "world") renderWorld();
  else document.getElementById("view").innerHTML = "<h2>" + tab + " (coming soon)</h2>";
}

function renderWorld() {
  const view = document.getElementById("view");

  view.innerHTML = `
    <h2>World</h2>

    <div>
      ${categories.map(c => `
        <span class="filter ${activeCategory===c?"active":""}" onclick="setCategory('${c}')">${c}</span>
      `).join("")}
    </div>

    <br>

    <button onclick="openWorldForm()">New Entry</button>

    <div id="worldList"></div>
  `;

  renderWorldList();
}

function setCategory(cat) {
  activeCategory = cat;
  renderWorld();
}

function renderWorldList() {
  const list = document.getElementById("worldList");
  list.innerHTML = "";

  const filtered = activeCategory==="All"
    ? state.world
    : state.world.filter(e => e.category === activeCategory);

  filtered.forEach(entry => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${entry.title}</strong>
      <p>${entry.content || ""}</p>
      <div>${(entry.tags||[]).map(t=>"<span class='tag'>"+t+"</span>").join("")}</div>
      ${entry.file ? "<p>File attached</p>" : ""}
    `;

    list.appendChild(div);
  });
}

function openWorldForm() {
  const modal = document.getElementById("modal");
  modal.classList.remove("hidden");

  modal.innerHTML = `
    <div class="modal-content">
      <h3>New Entry</h3>

      <input id="title" placeholder="Title">
      <select id="category">
        ${categories.filter(c=>c!=="All").map(c=>"<option>"+c+"</option>").join("")}
      </select>
      <textarea id="content" placeholder="Content"></textarea>
      <input id="tags" placeholder="Tags (comma separated)">
      <input type="file" id="file">

      <button onclick="saveWorld()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  `;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

function saveWorld() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const content = document.getElementById("content").value;
  const tags = document.getElementById("tags").value.split(",").map(t=>t.trim());

  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!title) return;

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      state.world.push({
        title, category, content, tags,
        file: e.target.result
      });
      save();
      closeModal();
      renderWorld();
    };
    reader.readAsDataURL(file);
  } else {
    state.world.push({ title, category, content, tags });
    save();
    closeModal();
    renderWorld();
  }
}

navigate("world");
</script>

</body>
</html>
